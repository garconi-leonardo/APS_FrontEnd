<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas - To-Do List</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container dashboard">
        <!-- Cabeçalho com título e botão de logout -->
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Minhas Tarefas</h1>
            <button id="logoutBtn" class="btn-logout">Sair</button>
        </header>

        <!-- Seção para adicionar nova tarefa -->
        <section class="task-input" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="taskDesc" placeholder="O que precisa ser feito?" style="flex-grow: 1; padding: 10px;">
            <button id="addTaskBtn">Adicionar</button>
        </section>

        <!-- Lista de tarefas (preenchida pelo JavaScript) -->
        <ul id="taskList" style="list-style: none; padding: 0;">
            <!-- Tarefas serão injetadas pelo scripts.js -->
        </ul>
    </div>

    <!-- Script de funcionalidades -->
    <script src="js/scripts.js"></script>
</body>
</html>
