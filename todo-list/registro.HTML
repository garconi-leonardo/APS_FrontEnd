<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro - To-Do List</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Criar Conta</h1>
        <form id="registerForm">
            <input type="text" id="regName" placeholder="Nome" required>
            <input type="email" id="regEmail" placeholder="E-mail" required>
            <input type="password" id="regPassword" placeholder="Senha" required>
            <button type="submit">Cadastrar</button>
        </form>
        <p>Já possui conta? <a href="login.html">Faça Login</a></p>
    </div>
    <script src="js/scripts.js"></script>
</body>
</html>
